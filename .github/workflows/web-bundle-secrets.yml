name: Web bundle secret scan

# Build the public web bundle with canary secrets and fail if any leak into it.
# Guards against regressions of #219, where the backend conf.json (holding real
# secrets) was bundled into the world-readable JS.

on:
  push:
    branches: [ master ]
    paths:
      - 'web/**'
      - 'Makefile'
      - 'conf.json_'
      - '.github/workflows/web-bundle-secrets.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'web/**'
      - 'Makefile'
      - 'conf.json_'
      - '.github/workflows/web-bundle-secrets.yml'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 18

    # Identical to running `make test-bundle-secrets` locally: build the bundle
    # against a canary config and fail if any secret leaks into it. All logic
    # lives in the make target so local and CI runs stay in parity.
    # CI=false so react-scripts does not treat lint warnings as build errors,
    # matching how the bundle is built in production.
    - name: Bundle secret scan
      env:
        CI: false
      run: make test-bundle-secrets
